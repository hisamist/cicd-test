name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip' # Accélère les exécutions suivantes

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov ruff taskipy

      - name: Run linter
        run: task lint

      - name: Run tests with coverage
        # Cette commande échouera automatiquement si la couverture < 80%
        # car elle appelle : python -m pytest --cov=src --cov-fail-under=80
        run: task cov
